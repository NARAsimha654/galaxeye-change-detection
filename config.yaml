# ── GalaxEye EO-SAR Binary Change Detection ──────────────────────────────────
# All hyperparameters centralised here. Pass to train.py via --config config.yaml

data:
  root: "data" # relative path to dataset root
  image_size: 512 # training crop size (full image is 1024x1024)
  num_workers: 4

model:
  architecture: "dual_encoder_unet" # dual_encoder_unet | early_fusion_unet
  encoder: "resnet34" # backbone for both EO and SAR encoders
  encoder_weights: "imagenet" # pretrained weights
  decoder_channels: [256, 128, 64, 32, 16]

training:
  epochs: 60
  batch_size: 8 # 512x512 crops, RTX 3060 6GB
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine" # cosine annealing
  scheduler_min_lr: 0.000001
  gradient_clip: 1.0
  seed: 42
  mixed_precision: true # fp16 to fit in 6GB VRAM

loss:
  focal_weight: 0.5
  dice_weight: 0.5
  focal_gamma: 2.0
  focal_alpha: 0.75 # higher weight on change (positive) class

sampling:
  change_oversample_ratio: 0.7 # 70% of batches sampled from change-rich patches

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotate_90: true
  eo_brightness_limit: 0.2
  eo_contrast_limit: 0.2
  sar_speckle_noise: 0.05
  elastic_transform: true

normalization:
  eo_mean: [84.504, 91.558, 71.558] # computed from explore.py
  eo_std: [51.559, 40.504, 38.178]
  sar_mean: [52.051]
  sar_std: [39.075]

evaluation:
  metric: "f1" # metric to monitor for best checkpoint
  save_dir: "weights"
  log_dir: "outputs/runs"

label_remap: # original → binary
  0: 0 # Background → No-Change
  1: 0 # Intact     → No-Change
  2: 1 # Damaged    → Change
  3: 1 # Destroyed  → Change
